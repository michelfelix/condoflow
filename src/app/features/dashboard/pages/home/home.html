<input
  type="text"
  placeholder="Buscar condomínio..."
  [formControl]="searchControl"
/>

@if(isLoading) {

  <p>Carregando...</p>

}

@if(errorMessage) {

  <p>{{ errorMessage }}</p>

}

@for(condo of condominiums; track condo.id) {

  <app-condominium-card
    [condominium]="condo"
    (favorite)="onFavorite($event)">
  </app-condominium-card>
  
}

<h2>Favoritos</h2>

  @for(favorite of favorites; track favorite.id) {

  <p>{{ favorite.name }}</p>

}
