<input
  type="text"
  placeholder="Buscar condomínio..."
  [formControl]="searchControl"
/>

@if(isLoading) {

  <p>Carregando...</p>

}

@if(errorMessage) {

  <p>{{ errorMessage }}</p>

}

@for(condo of condominiums; track condo.id) {

  <div>
    <h3>{{ condo.name }}</h3>
    <p>{{ condo.address.city }}</p>
  </div>

}
